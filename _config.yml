theme: jekyll-theme-minimal
title: ITLCT Research Blog
description: Unified Framework for Information-Time-Life-Consciousness
show_downloads: false
google_analytics:

# 基础 URL
baseurl: /chronos-blog
url: https://sandmark78.github.io
repository: sandmark78/chronos-blog

# Markdown 配置
markdown: kramdown
future: true

# 文章永久链接格式 - 使用简单格式避免 404
permalink: /:title.html

# 默认值
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: default
  - scope:
      path: "itlct-core-theory.md"
      type: pages
    values:
      permalink: /itlct-core-theory.html
  - scope:
      path: "itlct-experimental-roadmap.md"
      type: pages
    values:
      permalink: /itlct-experimental-roadmap.html
