theme: jekyll-theme-minimal
title: ITLCT Research Blog
description: Unified Framework for Information-Time-Life-Consciousness
show_downloads: false
google_analytics:

# 基础 URL
baseurl: /chronos-blog
url: https://sandmark78.github.io

# Collections - 让 posts/ 目录正常工作
collections:
  posts:
    output: true

# Permalink 设置 - 对 collections posts 使用日期格式
permalink: /:year/:month/:day/:title/
markdown: kramdown

# 默认值
defaults:
  - scope:
      path: "posts"
      type: posts
    values:
      layout: default
